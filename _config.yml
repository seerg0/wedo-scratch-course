# GitHub Pages конфигурация для Jekyll

title: "Курс программирования: WeDo + Scratch"
description: "Детские занятия по LEGO WeDo и Scratch для детей 6–9 лет"
baseurl: "/wedo-scratch-course"
url: "https://seerg0.github.io"

# Настройки темы
theme: minima
markdown: kramdown
highlighter: rouge

# Структура навигации
header_pages:
  - README.md
  - 0_формат_курса.md
  - 1_сигнализация_wedo.md
  - 2_сигнализация_scratch.md

# Настройки плагинов
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Исключения из сборки
exclude:
  - .windsurf/
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Настройки для Markdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# SEO настройки
author: "Sergey Mazur"
lang: ru
timezone: UTC

# Google Analytics (если нужно)
# google_analytics: UA-XXXXXXXXX-X

# GitHub Pages
safe: true
